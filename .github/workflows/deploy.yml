name: Deploy Backend
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Переходим в папку, где лежит docker-compose.yml
            cd ~/my_app/
            
            # Обновляем код в подпапке бэкенда
            cd backend-project
            git pull origin main
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Возвращаемся к docker-compose.yml и запускаем сборку
            cd ..
            docker compose up -d --build backend
