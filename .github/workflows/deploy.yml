name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: gennadypol/board-games-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: PROD
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Заходим в общий корень проекта
            cd ~/my_app
            
            # 2. Обновляем переменные окружения (секреты)
            # Убеждаемся, что директория существует
            mkdir -p backend-project
            
            # Записываем секреты ровно туда, где их ждет docker-compose
            echo "${{ secrets.ENV_FILE }}" > ./backend-project/.env
            
            # 3. Подтягиваем свежий образ бэкенда
            docker compose pull backend
            
            # 4. Перезапускаем ТОЛЬКО бэкенд. 
            # Флаг --no-deps не трогает базу и nginx, работа сайта не прерывается.
            docker compose up -d --no-deps backend
            
            # 5. Запускаем миграции Alembic (если используешь их). 
            # Флаг -T нужен для работы внутри скриптов GitHub Actions.
            docker compose exec -T backend alembic upgrade head || echo "Миграции не применены или Alembic не настроен"
            
            # 6. Чистим диск от старых образов
            docker image prune -f
