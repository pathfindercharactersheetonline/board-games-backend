name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Замени 'ваш_логин' на свой ник в Docker Hub
          tags: gennadypol/board-games-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Ждем, пока образ соберется и улетит в хаб
    environment: PROD
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/my_app/backend-project
            git pull origin main
            echo "${{ secrets.ENV_FILE }}" > .env
            # 1. Скачиваем новый образ из Docker Hub
            docker compose pull backend
            # 2. Перезапускаем контейнеры без пересборки на сервере
            docker compose up -d backend db nginx
            # 3. Очистка старых слоев
            docker image prune -f
