name: Deploy Backend

on:
  push:
    branches:
      - main  # или master, проверь имя своей ветки

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Заходим в папку бэкенда
            cd ~/my_app/backend-project
            
            # 2. Обновляем код
            git pull origin main
            
            # 3. Создаем .env из секретов
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # 4. Перезапускаем контейнеры (Бэк, БД и Nginx)
            # Внимание: сеть proxy_network должна быть уже создана вручную на VPS!
            docker compose up -d --build
            
            # 5. Очистка старых образов
            docker image prune -f
